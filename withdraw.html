<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KokoRun - سحب الأرباح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: white;
        }
        .glow {
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden bg-slate-950">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-yellow-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="max-w-lg w-full bg-slate-900/80 border border-slate-800 p-8 md:p-12 rounded-[2.5rem] shadow-2xl backdrop-blur-xl relative z-10 text-center space-y-8">
        <div class="space-y-4">
            <div class="w-24 h-24 mx-auto bg-emerald-500/20 rounded-3xl flex items-center justify-center text-emerald-500 border border-emerald-500/30 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight leading-tight">
                مبروك! لقد فزت بنجاح
            </h1>
            <p class="text-slate-400 text-lg">
                لسحب أرباحك فوراً، يرجى إكمال عملية التسجيل السريعة.
            </p>
        </div>

        <div class="bg-slate-950/50 border border-slate-800 rounded-3xl p-6 space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-slate-500 font-bold uppercase tracking-wider text-xs">رصيدك الحالي</span>
                <span class="text-emerald-500 text-xs font-black bg-emerald-500/10 px-2 py-1 rounded">جاهز للسحب</span>
            </div>
            <div class="text-5xl font-mono font-black text-white" id="balance-display">
                1,250 <span class="text-xl text-slate-500">ج.م</span>
            </div>
            <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-emerald-500" style="width: 100%; transition: width 2s ease-out;"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="flex items-center justify-center gap-2 text-rose-400 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span class="text-sm font-bold">نافذة السحب محدودة الوقت - تنتهي قريباً</span>
            </div>

            <button 
                onclick="window.location.href = 'https://example.com/affiliate-link'"
                class="w-full py-5 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black text-xl rounded-2xl transition-all active:scale-[0.98] shadow-2xl shadow-yellow-500/40 flex items-center justify-center gap-3 group"
            >
                المتابعة للسحب
            </button>

            <button 
                id="return-button"
                onclick="window.location.href = '/'"
                class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-sm rounded-xl transition-all active:scale-[0.98] border border-slate-700 flex items-center justify-center gap-2"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                العودة واستكمال اللعب
            </button>

            <div class="flex items-center justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Vodafone_Cash_Logo.png/1200px-Vodafone_Cash_Logo.png" alt="Vodafone Cash" class="h-6 object-contain" />
                <img src="https://instapay.eg/assets/images/logo.png" alt="InstaPay" class="h-6 object-contain" />
            </div>
        </div>
    </div>
    <script>
        // Get balance from URL
        const urlParams = new URLSearchParams(window.location.search);
        const balance = urlParams.get('balance');
        
        if (balance) {
            const balanceDisplay = document.getElementById('balance-display');
            const returnButton = document.getElementById('return-button');
            
            // Format balance with commas
            const formattedBalance = Number(balance).toLocaleString('en-US');
            balanceDisplay.innerHTML = `${formattedBalance} <span class="text-xl text-slate-500">ج.م</span>`;
            
            // Update return button to pass balance back
            returnButton.onclick = () => {
                window.location.href = `/?balance=${balance}`;
            };
        }
    </script>
</body>
</html>
